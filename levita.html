<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#171210">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Levita · Cifras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#171210; --bg2:#1f1916; --panel:#241d19; --panel2:#2c241f;
  --line:#3a302a; --text:#f4ece2; --muted:#a99a8b;
  --gold:#e0a85a; --gold-soft:#f0c98a; --chord:#e8b06a; --section:#8fb39a;
  --danger:#d9785f; --shadow:0 18px 50px -20px rgba(0,0,0,.7);
  --r:16px;
}
.light{
  --bg:#f3ece1; --bg2:#efe6d8; --panel:#fbf6ec; --panel2:#f3ebdd;
  --line:#e0d4c0; --text:#2a221c; --muted:#7d6e5d;
  --gold:#a86f23; --gold-soft:#7a5012; --chord:#9a5a12; --section:#3f7a55;
  --danger:#b5462c; --shadow:0 18px 50px -24px rgba(80,55,20,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(224,168,90,.10), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:'Hanken Grotesk',ui-sans-serif,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}
.app{max-width:860px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
.hidden{display:none!important}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;gap:10px;
  padding:14px 16px calc(14px) 16px;
  padding-top:max(14px,env(safe-area-inset-top));
  background:linear-gradient(var(--bg),rgba(23,18,16,.82));
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line);
}
.brand{font-family:'Fraunces',serif;font-weight:600;font-size:24px;letter-spacing:.3px;
  display:flex;align-items:center;gap:9px}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 16px var(--gold)}
.brand .ver{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  color:var(--muted);letter-spacing:0;align-self:flex-end;margin-bottom:4px;
  background:var(--panel);border:1px solid var(--line);padding:1px 7px;border-radius:999px}
.topbar .spacer{flex:1}
.iconbtn{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
  background:var(--panel);border:1px solid var(--line);font-size:18px;transition:.15s}
.iconbtn:active{transform:scale(.93)}
.iconbtn.gold{background:var(--gold);color:#231603;border-color:transparent;font-weight:700}

/* ---------- Library ---------- */
.lib{padding:18px 16px 120px}
.searchwrap{position:relative;margin-bottom:14px}
.search{width:100%;padding:14px 16px 14px 44px;border-radius:14px;background:var(--panel);
  border:1px solid var(--line);color:var(--text);font-size:16px;outline:none}
.search::placeholder{color:var(--muted)}
.searchwrap .mag{position:absolute;left:15px;top:50%;transform:translateY(-50%);opacity:.6}
.tagbar{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none}
.tagbar::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:7px 14px;border-radius:999px;background:var(--panel);
  border:1px solid var(--line);font-size:13.5px;color:var(--muted);font-weight:500}
.chip.on{background:var(--gold);color:#231603;border-color:transparent;font-weight:700}
.count{font-size:12.5px;color:var(--muted);margin:2px 2px 12px;letter-spacing:.3px;text-transform:uppercase}
.songcard{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:var(--r);
  background:var(--panel);border:1px solid var(--line);margin-bottom:11px;transition:.15s}
.songcard:active{transform:scale(.985);background:var(--panel2)}
.keytag{flex:0 0 auto;width:46px;height:46px;border-radius:13px;display:grid;place-items:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px;
  background:linear-gradient(140deg,var(--panel2),var(--bg2));color:var(--gold);
  border:1px solid var(--line)}
.songcard .meta{flex:1;min-width:0}
.songcard .ttl{font-family:'Fraunces',serif;font-size:18px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.songcard .sub{font-size:13.5px;color:var(--muted);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;margin-top:2px}
.songcard .tags{font-size:11.5px;color:var(--section);margin-top:3px}
.empty{text-align:center;padding:70px 24px;color:var(--muted)}
.empty .big{font-family:'Fraunces',serif;font-size:21px;color:var(--text);margin-bottom:8px}

/* ---------- Floating actions ---------- */
.fab{position:fixed;left:0;right:0;bottom:0;z-index:25;
  padding:14px 16px calc(16px + env(safe-area-inset-bottom));
  display:flex;gap:10px;max-width:860px;margin:0 auto;
  background:linear-gradient(transparent,var(--bg) 38%)}
.btn{flex:1;padding:16px;border-radius:15px;font-size:15.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;
  border:1px solid var(--line);background:var(--panel)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--gold);color:#231603;border-color:transparent;
  box-shadow:0 10px 30px -10px rgba(224,168,90,.6)}

/* ---------- Player ---------- */
.controls{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg),rgba(23,18,16,.92));
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line);
  padding:10px 12px;padding-top:max(10px,env(safe-area-inset-top))}
.ctrlrow{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;align-items:stretch}
.ctrlrow::-webkit-scrollbar{display:none}
.ctrl{flex:0 0 auto;display:flex;align-items:center;background:var(--panel);
  border:1px solid var(--line);border-radius:13px;overflow:hidden}
.ctrl .lbl{font-size:11px;color:var(--muted);padding:0 9px;text-transform:uppercase;
  letter-spacing:.6px;font-weight:600;align-self:center}
.ctrl button{padding:10px 13px;font-size:17px;font-weight:700;min-width:40px}
.ctrl button:active{background:var(--panel2)}
.ctrl .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;
  color:var(--gold);padding:0 4px;min-width:46px;text-align:center;align-self:center}
.ctrl.toggle button.on{background:var(--gold);color:#231603}
.songhead{padding:18px 18px 4px}
.songhead .h{font-family:'Fraunces',serif;font-size:25px;font-weight:600;line-height:1.15}
.songhead .s{color:var(--muted);font-size:14px;margin-top:4px}
.cifra{font-family:'JetBrains Mono',ui-monospace,'Courier New',monospace;
  font-size:15px;line-height:1.85;padding:8px 18px 220px;white-space:pre;
  overflow-x:auto;-webkit-overflow-scrolling:touch}
.cifra .chord{color:var(--chord);font-weight:700}
.cifra .sec{color:var(--section);font-weight:700;font-style:normal;
  display:inline-block;margin-top:6px}
.cifra .lyr{color:var(--text)}
.scrollbar-mini{position:fixed;left:0;right:0;bottom:0;z-index:24;max-width:860px;margin:0 auto;
  padding:12px 16px calc(14px + env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(transparent,var(--bg) 40%)}
.scrollbtn{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-size:20px;
  background:var(--gold);color:#231603;border:none;box-shadow:0 10px 26px -8px rgba(224,168,90,.7);
  flex:0 0 auto}
.scrollbtn:active{transform:scale(.94)}
.speed{flex:1;display:flex;align-items:center;gap:10px;background:var(--panel);
  border:1px solid var(--line);border-radius:15px;padding:10px 16px}
.speed span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.speed input{flex:1;accent-color:var(--gold)}

/* ---------- Editor ---------- */
.editor{padding:18px 16px 140px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.7px;font-weight:600;margin-bottom:7px}
.field input,.field textarea,.field select{width:100%;padding:13px 15px;border-radius:13px;
  background:var(--panel);border:1px solid var(--line);color:var(--text);font-size:16px;outline:none}
.field input:focus,.field textarea:focus{border-color:var(--gold)}
.row2{display:flex;gap:12px}.row2>*{flex:1}
.field textarea{min-height:300px;font-family:'JetBrains Mono',monospace;font-size:14px;
  line-height:1.7;white-space:pre;resize:vertical}
.hint{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:6px}
.hint code{background:var(--panel2);padding:1px 6px;border-radius:5px;color:var(--gold-soft)}
.deletebtn{width:100%;padding:14px;border-radius:13px;color:var(--danger);
  background:transparent;border:1px solid var(--line);font-weight:600;margin-top:6px}
.lint{margin-top:10px;font-size:13px;line-height:1.6;border-radius:11px;padding:11px 13px;
  border:1px solid var(--line);background:var(--panel2)}
.lint.ok{color:var(--section)}
.lint.warn{color:var(--gold-soft);border-color:var(--gold)}
.lint b{font-family:'JetBrains Mono',monospace;color:var(--danger);font-weight:700}

/* ---------- Toast / sheet ---------- */
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
  background:var(--panel2);border:1px solid var(--line);color:var(--text);
  padding:13px 20px;border-radius:13px;font-size:14px;font-weight:600;z-index:60;
  box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sheetbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;opacity:0;transition:.2s;pointer-events:none}
.sheetbg.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;max-width:860px;margin:0 auto;
  background:var(--panel);border-radius:24px 24px 0 0;border:1px solid var(--line);
  padding:10px 16px calc(20px + env(safe-area-inset-bottom));transform:translateY(110%);
  transition:.28s cubic-bezier(.2,.9,.3,1);box-shadow:var(--shadow)}
.sheet.show{transform:translateY(0)}
.sheet .grip{width:42px;height:5px;border-radius:3px;background:var(--line);margin:6px auto 14px}
.sheet h3{font-family:'Fraunces',serif;margin:0 6px 10px;font-size:19px;font-weight:600}
.sheetitem{display:flex;align-items:center;gap:14px;padding:15px 12px;border-radius:13px;font-size:16px}
.sheetitem:active{background:var(--panel2)}
.sheetitem .ic{font-size:19px;width:24px;text-align:center}
.sheetitem.danger{color:var(--danger)}
</style>
</head>
<body>
<div class="app">
  <!-- ===== LIBRARY VIEW ===== -->
  <div id="view-lib">
    <div class="topbar">
      <div class="brand"><span class="dot"></span>Levita<span class="ver" id="appVer"></span></div>
      <div class="spacer"></div>
      <button class="iconbtn" id="themeBtn" title="Tema">◐</button>
      <button class="iconbtn" id="importBtn" title="Importar">↧</button>
    </div>
    <div class="lib">
      <div class="searchwrap">
        <span class="mag">🔍</span>
        <input class="search" id="search" placeholder="Buscar música, artista, tom…">
      </div>
      <div class="tagbar" id="tagbar"></div>
      <div class="count" id="count"></div>
      <div id="songlist"></div>
    </div>
    <div class="fab">
      <button class="btn primary" id="newBtn">＋ Nova cifra</button>
      <button class="btn" id="backupBtn">↥ Backup</button>
    </div>
  </div>

  <!-- ===== PLAYER VIEW ===== -->
  <div id="view-player" class="hidden">
    <div class="controls">
      <div class="topbar" style="position:static;background:none;border:none;backdrop-filter:none;padding:6px 0 10px">
        <button class="iconbtn" id="p-back">←</button>
        <div class="spacer"></div>
        <button class="iconbtn" id="p-edit" title="Editar">✎</button>
        <button class="iconbtn gold" id="p-share" title="Compartilhar">↗</button>
      </div>
      <div class="ctrlrow">
        <div class="ctrl"><span class="lbl">Tom</span>
          <button id="t-down">♭</button><span class="val" id="t-key">C</span><button id="t-up">♯</button>
        </div>
        <div class="ctrl"><span class="lbl">Capo</span>
          <button id="c-down">−</button><span class="val" id="c-val">0</span><button id="c-up">＋</button>
        </div>
        <div class="ctrl"><span class="lbl">Fonte</span>
          <button id="f-down">A−</button><button id="f-up">A＋</button>
        </div>
        <div class="ctrl toggle"><span class="lbl">Só letra</span>
          <button id="lyr-toggle">𝄞</button>
        </div>
        <div class="ctrl toggle"><span class="lbl">♯/♭</span>
          <button id="acc-toggle">♯</button>
        </div>
      </div>
    </div>
    <div class="songhead">
      <div class="h" id="p-title"></div>
      <div class="s" id="p-sub"></div>
    </div>
    <div class="cifra" id="p-body"></div>
    <div class="scrollbar-mini">
      <button class="scrollbtn" id="scroll-toggle">▶</button>
      <div class="speed"><span>Velocidade</span>
        <input type="range" id="scroll-speed" min="1" max="10" value="4">
      </div>
    </div>
  </div>

  <!-- ===== EDITOR VIEW ===== -->
  <div id="view-editor" class="hidden">
    <div class="topbar">
      <button class="iconbtn" id="e-cancel">✕</button>
      <div class="brand" style="font-size:19px"><span id="e-mode">Nova cifra</span></div>
      <div class="spacer"></div>
      <button class="iconbtn gold" id="e-save" style="width:auto;padding:0 18px;font-size:15px">Salvar</button>
    </div>
    <div class="editor">
      <div class="field"><label>Título</label><input id="e-title" placeholder="Ex.: Tua Graça Me Basta"></div>
      <div class="field"><label>Artista / autor</label><input id="e-artist" placeholder="Opcional"></div>
      <div class="row2">
        <div class="field"><label>Tom original</label>
          <select id="e-key"></select>
        </div>
        <div class="field"><label>Capo</label>
          <select id="e-capo"></select>
        </div>
      </div>
      <div class="field"><label>Tags (separe por vírgula)</label>
        <input id="e-tags" placeholder="adoração, lento, ceia"></div>
      <div class="field"><label>Cifra</label>
        <textarea id="e-body" spellcheck="false" placeholder="Cole a cifra aqui…"></textarea>
        <div class="hint">
          Funciona com cifra colada do estilo Cifra Club (acordes em cima da letra)
          <b>ou</b> com colchetes no meio da letra: <code>[C]Letra [G]aqui</code>.<br>
          Seções: escreva entre colchetes numa linha só, ex.: <code>[Refrão]</code> ou <code>Intro:</code>
        </div>
        <div class="lint" id="e-lint"></div>
      </div>
      <button class="deletebtn hidden" id="e-delete">🗑 Excluir esta cifra</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="sheetbg" id="sheetbg"></div>
<div class="sheet" id="sheet">
  <div class="grip"></div>
  <h3 id="sheet-title">Compartilhar</h3>
  <div id="sheet-body"></div>
</div>
<input type="file" id="fileInput" accept=".json,application/json" class="hidden">

<script>
"use strict";
/* =========================================================================
   LEVITA · app de cifras  —  offline-first, arquivo único
   Tudo é salvo no próprio aparelho (localStorage). Compartilhamento por arquivo.
   ========================================================================= */
const APP_VERSION = "0.3.0";  // ← versão do app (ver CHANGELOG.md)

/* ---------- Música: notas e transposição ---------- */
const SHARP = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLAT  = ["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];
const NOTE_IDX = {};
SHARP.forEach((n,i)=>NOTE_IDX[n]=i);
FLAT.forEach((n,i)=>NOTE_IDX[n]=i);

/* ===== FONTE DA VERDADE: o que é um acorde válido =====
   Acorde = fundamental + alteração + qualidade/extensões + baixo opcional /X.
   Esta gramática é usada em TODO lugar: exibição, transposição e validação.
   Para aceitar um novo sufixo (ex.: um símbolo raro), basta adicioná-lo abaixo. */
const QUAL_RX = new RegExp("^(?:" + [
  "maj7","maj9","maj13","maj","min7","min",      // maiores/menores por extenso
  "sus2","sus4","sus","add9","add11","add2","add4","add6","add13","add",
  "dim7","dim","aug","m7b5","M7","M","m",         // qualidades
  "°","º","ø","∅","Δ","\\+","\\-",                // símbolos
  "13","11","9","7","6","5","4","3","2","6\\/9",   // extensões numéricas
  "b5","b6","b9","b13","#5","#9","#11",            // tensões alteradas
  "\\([^)]{0,14}\\)"                               // tensões entre parênteses: (9), (b9), (#11)…
].join("|") + ")*$");
// Tokens neutros que não desqualificam uma linha de acordes
const NEUTRAL_RE = /^(\||:\||\|:|\|\||\(?\d+x\)?|x\d+|\.|·)$/i;

// parseChord: o coração da fonte da verdade. Retorna {root, suffix, bass} ou null.
function parseChord(raw){
  if(!raw) return null;
  let tok = String(raw).trim();
  if(!tok) return null;
  let bass=null;
  const slash = tok.match(/^(.+)\/([A-G](?:#|b)?)$/);  // baixo invertido /Nota
  if(slash){ tok = slash[1]; bass = slash[2]; }
  const rm = tok.match(/^([A-G](?:#|b)?)(.*)$/);        // fundamental
  if(!rm) return null;
  const root = rm[1], suffix = rm[2];
  if(!QUAL_RX.test(suffix)) return null;                // valida a qualidade
  return { root, suffix, bass };
}

function transposeNote(note, semis, acc){
  if(!(note in NOTE_IDX)) return note;
  const idx = (NOTE_IDX[note] + semis % 12 + 12) % 12;
  return (acc === "flat" ? FLAT : SHARP)[idx];
}
function isChord(tok){ return parseChord(tok)!==null; }
function transposeChord(tok, semis, acc){
  const p = parseChord(tok);
  if(!p) return tok;
  let out = transposeNote(p.root, semis, acc) + p.suffix;
  if(p.bass) out += "/" + transposeNote(p.bass, semis, acc);
  return out;
}
/* Corretor não-bloqueante: aponta tokens que parecem acorde mas não são válidos.
   Só examina linhas que são "majoritariamente acordes" (assim a letra fica livre). */
function lintCifra(body){
  const lines = (body||"").replace(/\r/g,"").split("\n");
  const issues = [];
  lines.forEach((line,i)=>{
    if(!line.trim() || isSectionLine(line)) return;
    const toks = line.trim().split(/\s+/).filter(Boolean).filter(t=>!NEUTRAL_RE.test(t));
    if(!toks.length) return;
    const chords = toks.filter(isChord).length;
    if(chords>=1 && chords<toks.length && chords/toks.length>=0.5){
      toks.forEach(t=>{ if(!isChord(t) && /^[A-G]/.test(t)) issues.push({line:i+1, token:t}); });
    }
  });
  // acordes inline entre colchetes: [G7x] -> suspeito
  (body||"").split("\n").forEach((line,i)=>{
    (line.match(/\[([^\]]+)\]/g)||[]).forEach(b=>{
      const inner=b.slice(1,-1);
      if(/^[A-G]/.test(inner) && !isChord(inner) && !isSectionLine(b))
        issues.push({line:i+1, token:b});
    });
  });
  return issues;
}
// Uma linha é "linha de acordes" se, tirando neutros, tudo o que sobra é acorde
function isChordLine(line){
  const toks = line.trim().split(/\s+/).filter(Boolean);
  if(!toks.length) return false;
  const real = toks.filter(t => !NEUTRAL_RE.test(t));
  if(!real.length) return false;
  return real.every(isChord);
}
function isSectionLine(line){
  const t = line.trim();
  if(/^\[.+\]$/.test(t) && !isChord(t.replace(/^\[|\]$/g,""))) return true;
  // rótulos curtos terminados em ":" (Intro:, Refrão:, Solo:)
  return /^[^\n]{1,28}:$/.test(t) && !/\s\S+\s\S+\s\S+/.test(t);
}

/* ---------- Renderização da cifra ---------- */
function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function renderCifra(body, semis, showChords, acc){
  const lines = (body||"").replace(/\r/g,"").split("\n");
  const out = [];
  for(const line of lines){
    // 1) Seções
    if(isSectionLine(line)){
      if(showChords) out.push('<span class="sec">'+esc(line.trim())+'</span>');
      else out.push('<span class="sec">'+esc(line.trim().replace(/^\[|\]$/g,""))+'</span>');
      continue;
    }
    // 2) Linha só de acordes (estilo Cifra Club)
    if(isChordLine(line)){
      if(!showChords) continue; // modo "só letra" esconde
      const html = line.replace(/(\S+)/g, t =>
        isChord(t) ? '<span class="chord">'+esc(transposeChord(t,semis,acc))+'</span>' : esc(t));
      out.push(html);
      continue;
    }
    // 3) Linha de letra (pode ter acordes inline [C])
    let html = esc(line).replace(/\[([^\]]+)\]/g, (full,inner)=>{
      if(isChord(inner)){
        return showChords
          ? '<span class="chord">['+esc(transposeChord(inner,semis,acc))+']</span>'
          : '';
      }
      return showChords ? esc(full) : '';
    });
    out.push('<span class="lyr">'+html+'</span>');
  }
  return out.join("\n");
}

/* ---------- Armazenamento ---------- */
const KEYS = ["C","C#","Db","D","D#","Eb","E","F","F#","Gb","G","G#","Ab","A","A#","Bb","B",
              "Cm","C#m","Dm","D#m","Em","Fm","F#m","Gm","G#m","Am","A#m","Bm"];
const LS_SONGS="levita.songs.v1", LS_SET="levita.settings.v1";
let songs=[], settings={theme:"dark"};

function load(){
  try{songs=JSON.parse(localStorage.getItem(LS_SONGS))||[];}catch(e){songs=[];}
  try{settings=Object.assign({theme:"dark"},JSON.parse(localStorage.getItem(LS_SET))||{});}catch(e){}
  if(!songs.length){ songs=[demoSong()]; saveSongs(); }
}
function saveSongs(){ try{localStorage.setItem(LS_SONGS, JSON.stringify(songs));}catch(e){console.warn("Sem armazenamento local:",e);} }
function saveSettings(){ try{localStorage.setItem(LS_SET, JSON.stringify(settings));}catch(e){} }
function uid(){ return "s"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function demoSong(){
  return {
    id:uid(), title:"Cifra de Exemplo", artist:"Toque pra abrir · edite no lápis ✎",
    key:"G", capo:0, tags:["exemplo"], updatedAt:Date.now(),
    body:
`[Intro]
G  D  Em  C

Verso:
G                 D
Esta é uma cifra de exemplo
       Em                C
Os acordes ficam em cima da letra
G               D
Aperte ♯ e ♭ pra transpor o tom
      Em            C
E o ▶ embaixo rola a tela sozinho

[Refrão]
C            G
Toque o lápis pra editar
      D                 Em
Toque ↗ pra mandar pro grupo
C           G
Crie quantas quiser sem internet
        D            C        G
Tudo fica salvo aqui no seu aparelho`
  };
}

/* ---------- Estado da tela ---------- */
let view="lib", current=null, transp=0, capo=0, fontSize=15, showChords=true, activeTag=null;
const $=s=>document.querySelector(s);

function show(v){
  view=v;
  $("#view-lib").classList.toggle("hidden",v!=="lib");
  $("#view-player").classList.toggle("hidden",v!=="player");
  $("#view-editor").classList.toggle("hidden",v!=="editor");
  window.scrollTo(0,0);
}

/* ---------- Biblioteca ---------- */
function allTags(){
  const set=new Set();
  songs.forEach(s=>(s.tags||[]).forEach(t=>t&&set.add(t)));
  return [...set].sort((a,b)=>a.localeCompare(b,"pt"));
}
function renderLibrary(){
  // tags
  const tags=allTags();
  const tb=$("#tagbar"); tb.innerHTML="";
  if(tags.length){
    tags.forEach(t=>{
      const c=document.createElement("div");
      c.className="chip"+(activeTag===t?" on":"");
      c.textContent=t;
      c.onclick=()=>{activeTag=activeTag===t?null:t;renderLibrary();};
      tb.appendChild(c);
    });
  }
  // filtro
  const q=$("#search").value.trim().toLowerCase();
  let list=songs.slice().sort((a,b)=>a.title.localeCompare(b.title,"pt"));
  if(activeTag) list=list.filter(s=>(s.tags||[]).includes(activeTag));
  if(q) list=list.filter(s=>(s.title+" "+(s.artist||"")+" "+s.key+" "+(s.tags||[]).join(" ")).toLowerCase().includes(q));

  $("#count").textContent = list.length+(list.length===1?" cifra":" cifras");
  const box=$("#songlist"); box.innerHTML="";
  if(!list.length){
    box.innerHTML='<div class="empty"><div class="big">Nada por aqui ainda</div>'+
      'Toque em <b>＋ Nova cifra</b> para começar, ou <b>↧</b> para importar um arquivo do grupo.</div>';
    return;
  }
  list.forEach(s=>{
    const card=document.createElement("div");
    card.className="songcard";
    const tags=(s.tags||[]).filter(Boolean).slice(0,3).join(" · ");
    card.innerHTML=
      '<div class="keytag">'+esc(s.key||"?")+'</div>'+
      '<div class="meta"><div class="ttl">'+esc(s.title)+'</div>'+
      (s.artist?'<div class="sub">'+esc(s.artist)+'</div>':'')+
      (tags?'<div class="tags">'+esc(tags)+'</div>':'')+'</div>';
    card.onclick=()=>openPlayer(s.id);
    box.appendChild(card);
  });
}

/* ---------- Player ---------- */
function keyRoot(k){ const m=k.match(/^([A-G][#b]?)/); return m?m[1]:"C"; }
function keyIsMinor(k){ return /m$/.test(k); }
function openPlayer(id){
  current=songs.find(s=>s.id===id); if(!current)return;
  transp=0; capo=0; showChords=true; stopScroll();
  $("#acc-toggle").classList.remove("on"); $("#acc-toggle").textContent="♯";
  $("#lyr-toggle").classList.remove("on");
  show("player"); drawPlayer();
}
function acc(){ return $("#acc-toggle").classList.contains("on")?"flat":"sharp"; }
function soundingKey(){
  const root=transposeNote(keyRoot(current.key),transp,acc());
  return root+(keyIsMinor(current.key)?"m":"");
}
function shapeShift(){ return transp - capo; }   // forma tocada = som − capo
function drawPlayer(){
  $("#p-title").textContent=current.title;
  const bits=[];
  if(current.artist) bits.push(current.artist);
  bits.push("Tom: "+soundingKey());
  if(capo>0) bits.push("Capo "+capo+" (forma em "+(transposeNote(keyRoot(current.key),shapeShift(),acc())+(keyIsMinor(current.key)?"m":""))+")");
  $("#p-sub").textContent=bits.join("  ·  ");
  $("#t-key").textContent=soundingKey();
  $("#c-val").textContent=capo;
  const b=$("#p-body");
  b.style.fontSize=fontSize+"px";
  b.innerHTML=renderCifra(current.body, shapeShift(), showChords, acc());
}

/* controles do player */
$("#t-up").onclick=()=>{transp++;drawPlayer();};
$("#t-down").onclick=()=>{transp--;drawPlayer();};
$("#c-up").onclick=()=>{if(capo<11){capo++;drawPlayer();}};
$("#c-down").onclick=()=>{if(capo>0){capo--;drawPlayer();}};
$("#f-up").onclick=()=>{fontSize=Math.min(28,fontSize+1);drawPlayer();};
$("#f-down").onclick=()=>{fontSize=Math.max(10,fontSize-1);drawPlayer();};
$("#acc-toggle").onclick=()=>{const b=$("#acc-toggle");b.classList.toggle("on");b.textContent=b.classList.contains("on")?"♭":"♯";drawPlayer();};
$("#lyr-toggle").onclick=()=>{const b=$("#lyr-toggle");showChords=!showChords;b.classList.toggle("on",!showChords);drawPlayer();};
$("#p-back").onclick=()=>{stopScroll();show("lib");renderLibrary();};
$("#p-edit").onclick=()=>openEditor(current.id);
$("#p-share").onclick=()=>shareSheet(current);

/* auto-scroll */
let scrollRAF=null;
function startScroll(){
  $("#scroll-toggle").textContent="❚❚";
  let last=performance.now(),acc2=0;
  const step=now=>{
    const dt=now-last; last=now;
    const spd=+$("#scroll-speed").value;
    acc2+=dt*spd*0.012;
    if(acc2>=1){const px=Math.floor(acc2);window.scrollBy(0,px);acc2-=px;}
    scrollRAF=requestAnimationFrame(step);
  };
  scrollRAF=requestAnimationFrame(step);
}
function stopScroll(){ if(scrollRAF){cancelAnimationFrame(scrollRAF);scrollRAF=null;} $("#scroll-toggle").textContent="▶"; }
$("#scroll-toggle").onclick=()=>{ scrollRAF?stopScroll():startScroll(); };

/* ---------- Editor ---------- */
let editingId=null;
function fillSelect(sel,opts,val){
  sel.innerHTML=opts.map(o=>'<option'+(typeof o==="object"?' value="'+o.v+'"':'')+'>'+(typeof o==="object"?o.t:o)+'</option>').join("");
  sel.value=val;
}
function runLint(){
  const issues = lintCifra($("#e-body").value);
  const el = $("#e-lint");
  if(!issues.length){
    el.className="lint ok";
    el.textContent="✓ Acordes reconhecidos. Cifra pronta.";
    return [];
  }
  // agrupa por token, mostra até 6
  const uniq=[...new Set(issues.map(i=>i.token))].slice(0,6);
  el.className="lint warn";
  el.innerHTML="⚠ Não reconheci como acorde: "+uniq.map(t=>"<b>"+esc(t)+"</b>").join(", ")+
    (issues.length>uniq.length?" …":"")+"<br>Vão aparecer como letra. Confira se é erro de digitação.";
  return issues;
}
function openEditor(id){
  editingId=id||null;
  fillSelect($("#e-key"),KEYS,"G");
  fillSelect($("#e-capo"),Array.from({length:12},(_,i)=>i),0);
  const del=$("#e-delete");
  if(id){
    const s=songs.find(x=>x.id===id);
    $("#e-mode").textContent="Editar";
    $("#e-title").value=s.title; $("#e-artist").value=s.artist||"";
    $("#e-key").value=KEYS.includes(s.key)?s.key:"G"; $("#e-capo").value=s.capo||0;
    $("#e-tags").value=(s.tags||[]).join(", "); $("#e-body").value=s.body||"";
    del.classList.remove("hidden");
  }else{
    $("#e-mode").textContent="Nova cifra";
    $("#e-title").value="";$("#e-artist").value="";$("#e-key").value="G";
    $("#e-capo").value=0;$("#e-tags").value="";$("#e-body").value="";
    del.classList.add("hidden");
  }
  runLint();
  show("editor");
}
$("#e-body").addEventListener("input", runLint);
$("#newBtn").onclick=()=>openEditor(null);
$("#e-cancel").onclick=()=>{ editingId?openPlayer(editingId):show("lib"); editingId||renderLibrary(); };
$("#e-save").onclick=()=>{
  const title=$("#e-title").value.trim();
  if(!title){toast("Dê um título à cifra 🙂");return;}
  const issues=lintCifra($("#e-body").value);
  if(issues.length){
    const uniq=[...new Set(issues.map(i=>i.token))].slice(0,8).join(", ");
    if(!confirm("Encontrei algo que não parece acorde: "+uniq+"\n\nVai aparecer como letra. Salvar mesmo assim?")) return;
  }
  const data={
    title, artist:$("#e-artist").value.trim(),
    key:$("#e-key").value, capo:+$("#e-capo").value,
    tags:$("#e-tags").value.split(",").map(t=>t.trim()).filter(Boolean),
    body:$("#e-body").value, updatedAt:Date.now()
  };
  if(editingId){ Object.assign(songs.find(s=>s.id===editingId),data); }
  else{ data.id=uid(); songs.push(data); editingId=data.id; }
  saveSongs(); openPlayer(editingId); toast("Salvo ✓");
};
$("#e-delete").onclick=()=>{
  if(!editingId)return;
  if(confirm("Excluir esta cifra? Não dá pra desfazer.")){
    songs=songs.filter(s=>s.id!==editingId); saveSongs();
    editingId=null; show("lib"); renderLibrary(); toast("Cifra excluída");
  }
};

/* ---------- Compartilhamento por arquivo ---------- */
function download(filename, text){
  const blob=new Blob([text],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
async function shareFile(filename, text, title){
  const file=new File([text],filename,{type:"application/json"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file],title}); return true; }
    catch(e){ if(e.name==="AbortError") return true; }
  }
  download(filename,text); return false;
}
const slug=s=>(s||"cifra").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/gi,"-").replace(/^-|-$/g,"").toLowerCase();

function shareSheet(song){
  openSheet("Compartilhar “"+song.title+"”",[
    {ic:"↗",label:"Enviar esta cifra (.json)",fn:()=>{
      shareFile(slug(song.title)+".levita.json",
        JSON.stringify({type:"levita-song",version:1,app:APP_VERSION,song}),"Cifra: "+song.title);
      closeSheet();
    }},
    {ic:"✎",label:"Editar cifra",fn:()=>{closeSheet();openEditor(song.id);}},
    {ic:"⧉",label:"Copiar texto da cifra",fn:async()=>{
      try{await navigator.clipboard.writeText(song.body);toast("Texto copiado ✓");}
      catch(e){toast("Não consegui copiar");}
      closeSheet();
    }},
    {ic:"🗑",label:"Excluir",danger:true,fn:()=>{closeSheet();openEditor(song.id);$("#e-delete").click();}},
  ]);
}
$("#backupBtn").onclick=()=>{
  openSheet("Backup e compartilhamento",[
    {ic:"↥",label:"Exportar TODO o repertório (.json)",fn:()=>{
      shareFile("repertorio-levita.json",
        JSON.stringify({type:"levita-library",version:1,app:APP_VERSION,songs}),"Repertório Levita");
      closeSheet();
    }},
    {ic:"↧",label:"Importar arquivo (cifra ou repertório)",fn:()=>{closeSheet();$("#fileInput").click();}},
  ]);
};
$("#importBtn").onclick=()=>$("#fileInput").click();
$("#fileInput").onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ importJSON(r.result); $("#fileInput").value=""; };
  r.readAsText(f);
};
function importJSON(text){
  let data; try{data=JSON.parse(text);}catch(e){toast("Arquivo inválido 😕");return;}
  let incoming=[];
  if(data.type==="levita-song"&&data.song) incoming=[data.song];
  else if(data.type==="levita-library"&&Array.isArray(data.songs)) incoming=data.songs;
  else if(Array.isArray(data)) incoming=data;
  else if(data.title&&data.body) incoming=[data];
  else{toast("Não reconheci esse arquivo");return;}
  let added=0,updated=0;
  incoming.forEach(s=>{
    if(!s||!s.title)return;
    s.tags=s.tags||[]; s.capo=s.capo||0; s.updatedAt=s.updatedAt||Date.now();
    const ex=s.id&&songs.find(x=>x.id===s.id);
    if(ex){ if((s.updatedAt||0)>=(ex.updatedAt||0)){Object.assign(ex,s);updated++;} }
    else{ s.id=s.id||uid(); if(songs.some(x=>x.id===s.id))s.id=uid(); songs.push(s); added++; }
  });
  saveSongs(); renderLibrary();
  toast(`Importado: ${added} nova(s)`+(updated?`, ${updated} atualizada(s)`:""));
}

/* ---------- Sheet & toast ---------- */
function openSheet(title,items){
  $("#sheet-title").textContent=title;
  const b=$("#sheet-body"); b.innerHTML="";
  items.forEach(it=>{
    const el=document.createElement("div");
    el.className="sheetitem"+(it.danger?" danger":"");
    el.innerHTML='<span class="ic">'+it.ic+'</span>'+esc(it.label);
    el.onclick=it.fn; b.appendChild(el);
  });
  $("#sheetbg").classList.add("show");
  requestAnimationFrame(()=>$("#sheet").classList.add("show"));
}
function closeSheet(){ $("#sheet").classList.remove("show"); $("#sheetbg").classList.remove("show"); }
$("#sheetbg").onclick=closeSheet;

let toastT=null;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200);
}

/* ---------- Tema ---------- */
function applyTheme(){
  document.body.classList.toggle("light",settings.theme==="light");
  $("#themeBtn").textContent=settings.theme==="light"?"◑":"◐";
  document.querySelector('meta[name=theme-color]').setAttribute("content",settings.theme==="light"?"#f3ece1":"#171210");
}
$("#themeBtn").onclick=()=>{settings.theme=settings.theme==="light"?"dark":"light";saveSettings();applyTheme();};

/* ---------- Busca ---------- */
$("#search").oninput=renderLibrary;

/* ---------- Boot ---------- */
$("#appVer").textContent="v"+APP_VERSION;
load(); applyTheme(); renderLibrary(); show("lib");
</script>
