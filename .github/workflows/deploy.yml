name: Publicar Louvai (GitHub Pages)

# Publica o app no GitHub Pages a cada push no main (ou manualmente em "Run workflow").
# O index.html é GERADO aqui (cópia verbatim do louvai.html) — não precisa versioná-lo.
# Requisito no repo: Settings ▸ Pages ▸ Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Montar o site (index.html = louvai.html) + assets do app
        run: |
          mkdir -p _site
          cp louvai.html _site/index.html
          cp louvai.json _site/ 2>/dev/null || true
          cp manifest.webmanifest _site/ 2>/dev/null || true
          cp -r louvai-icons _site/ 2>/dev/null || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
